<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#7a9e7e" />
  <title>Sacred Pages</title>
  <style>
    html, body { margin: 0; height: 100%; background: #faf7f0; color: #3a3a36;
      font-family: ui-serif, Georgia, "Times New Roman", serif; }
    .wrap { height: 100%; display: flex; flex-direction: column;
      align-items: center; justify-content: center; text-align: center; padding: 2rem; }
    h1 { font-weight: 600; font-size: 1.6rem; margin: 0 0 .5rem; }
    p { color: #6b6b63; max-width: 22rem; line-height: 1.5; }
    .dot { width: 10px; height: 10px; border-radius: 999px; background: #7a9e7e;
      margin: 1.25rem auto 0; animation: pulse 1.6s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:.35;transform:scale(.9)} 50%{opacity:1;transform:scale(1.1)} }
    button { margin-top: 1.5rem; border: none; background: #7a9e7e; color: #fff;
      padding: .65rem 1.25rem; border-radius: .6rem; font-size: .95rem; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Sacred Pages</h1>
    <p>Opening your reading sanctuary&hellip; If this lingers, you may be offline. Your saved sessions are stored safely on this device.</p>
    <div class="dot"></div>
    <button onclick="location.reload()">Try again</button>
  </div>
</body>
</html>
